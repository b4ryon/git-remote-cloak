# CI for git-remote-cloak.
#
# Runs the stricter static-analysis gate (golangci-lint, which bundles
# staticcheck, errcheck, gosec, govet, ineffassign, and unused per
# .golangci.yml), the dependency vulnerability scan (govulncheck), and the
# unit + integration test suites. Each job invokes the matching Makefile
# target (`make lint`, `make vuln`, `make vet`, `make test`,
# `make test-integration`) so CI and local runs stay in lockstep -- the
# Makefile remains the single source of truth for how each gate is run.
#
# Runs on GOOS=linux (ubuntu-latest), where the pure-Go file keystore is
# compiled and gosec is clean. The cgo Keychain backend and its real-Keychain
# test (`make test-darwin`) are darwin-only and need an interactive login
# keychain, so they are intentionally excluded from headless CI.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repository contents.
permissions:
  contents: read

# Cancel superseded in-progress runs for the same ref to save runner time.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Static analysis (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Track the toolchain pinned in go.mod so CI matches local builds.
          go-version-file: go.mod
      # Go 1.26 requires the golangci-lint v2 module path. Pin the version so
      # CI is reproducible and matches the developer-local linter.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: Lint
        run: make lint

  vuln:
    name: Vulnerability scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan
        run: make vuln

  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: make vet
      - name: Unit tests
        run: make test
      # `make test-integration` builds the helper first and exercises it as a
      # real git remote-helper subprocess; the ubuntu runner provides git.
      - name: Integration tests
        run: make test-integration
